# Nombre de la aplicaciĂ³n
spring.application.name=ECOTACNA

# ConfiguraciĂ³n de Servidor
server.port=8082
server.servlet.context-path=/ecotacna

# ConfiguraciĂ³n de Seguridad y JWT
# Secreto HMAC-256 codificado (MĂ­nimo 256 bits para HS256)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# ExpiraciĂ³n del token en milisegundos (24 horas = 86400000 ms)
jwt.expiration=${JWT_EXPIRATION:86400000}

# Habilitar bootstrap inicial desde environment var (por defecto falso)
ecotacna.bootstrap.enabled=false

# Google reCAPTCHA v2 Checkbox
captcha.enabled=${CAPTCHA_ENABLED:true}
captcha.provider=${CAPTCHA_PROVIDER:recaptcha_v2}
captcha.recaptcha.secret=${RECAPTCHA_SECRET_KEY:}

# Payments Configuration
payments.enabled=${PAYMENTS_ENABLED:true}
payments.provider=${PAYMENTS_PROVIDER:mock}
payments.mode=${PAYMENTS_MODE:mock}

payments.culqi.public-key=${CULQI_PUBLIC_KEY:pk_test_dummy}
payments.culqi.secret-key=${CULQI_SECRET_KEY:sk_test_dummy}
payments.culqi.webhook-secret=${CULQI_WEBHOOK_SECRET:}

# API Peru RUC Lookup Token
apiperu.token=${APIPERU_TOKEN:}
