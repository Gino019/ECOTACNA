# Configuración de Base de Datos (H2 In-Memory) para Pruebas
spring.datasource.url=jdbc:h2:mem:ecotacna_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración de JPA / Hibernate para Pruebas
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Deshabilitar Liquibase o Flyway si los hubiera (no aplica por ahora, pero buena práctica)

